name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'meals/pending/*.json'
      - 'meals/done/*.json'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into index.html
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          sed -i "s|__SUPABASE_URL__|$SUPABASE_URL|g" index.html
          sed -i "s|__SUPABASE_KEY__|$SUPABASE_KEY|g" index.html
          sed -i "s|__GROQ_KEY__|$GROQ_KEY|g" index.html
          echo "Secrets injected successfully"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
